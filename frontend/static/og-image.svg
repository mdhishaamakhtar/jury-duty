<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400&amp;family=IBM+Plex+Sans:wght@400;600&amp;display=swap');

      .title {
        font-family: 'Source Serif 4', Georgia, 'Times New Roman', serif;
        font-weight: 400;
        letter-spacing: -0.02em;
        fill: #1c1917;
      }
      .badge {
        font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        font-weight: 600;
        letter-spacing: 0.18em;
        fill: #e11d48;
      }
      .subtitle {
        font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        font-weight: 400;
        fill: #a8a29e;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#f1f0ee"/>

  <!-- Central Content -->
  <g transform="translate(600, 315)">

    <!-- Ballot Box Logo -->
    <g transform="translate(-100, -210) scale(6.0)">
      <!-- Ballot Box Base -->
      <rect x="4" y="12" width="24" height="16" rx="2" ry="2" fill="#fecaca" stroke="#fca5a5" stroke-width="1"/>
      <!-- Ballot Box Slot -->
      <rect x="7" y="9" width="18" height="4" rx="2" ry="2" fill="#fca5a5"/>
      <rect x="8" y="10" width="16" height="2" fill="#f87171"/>
      <!-- Ballot Paper -->
      <rect x="11" y="4" width="10" height="12" rx="1" ry="1" fill="#fef7f7" stroke="#fed7d7" stroke-width="1"/>
      <!-- Ballot Options -->
      <circle cx="13.5" cy="7" r="1" fill="none" stroke="#d946ef" stroke-width="0.8"/>
      <circle cx="13.5" cy="10" r="1" fill="none" stroke="#d946ef" stroke-width="0.8"/>
      <!-- Selected Option -->
      <circle cx="13.5" cy="7" r="0.5" fill="#10b981"/>
      <!-- Option Labels -->
      <rect x="16" y="6.5" width="3" height="1" fill="#fbcfe8"/>
      <rect x="16" y="9.5" width="2.5" height="1" fill="#fbcfe8"/>
      <!-- Motion Lines -->
      <path d="M 14 14 L 16 16" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
      <path d="M 16 14 L 18 16" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    </g>

    <!-- "jury duty" wordmark -->
    <text x="0" y="100" text-anchor="middle" class="title" font-size="104">jury duty</text>

    <!-- "CONTENT LABELING SYSTEM" badge -->
    <text x="0" y="154" text-anchor="middle" class="badge" font-size="24">CONTENT LABELING SYSTEM</text>

    <!-- Subtitle -->
    <text x="0" y="248" text-anchor="middle" class="subtitle" font-size="30">Help improve AI through content labeling</text>

  </g>
</svg>
